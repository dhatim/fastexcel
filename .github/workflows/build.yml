name: build
on:
    push:
        branches: [ '*' ]
    pull_request:
        branches: [ '*' ]
jobs:
    build:
        runs-on: ubuntu-latest
        steps:
            -   uses: actions/checkout@v6
            -   uses: actions/setup-java@v5
                with:
                    distribution: 'zulu'
                    java-version: '11'
            -   name: maven build
                run: mvn --batch-mode --errors --show-version --no-transfer-progress clean verify jacoco:report
            -   name: code coverage (fastexcel-reader)
                uses: coverallsapp/github-action@v2
                with:
                    file: fastexcel-reader/target/site/jacoco/jacoco.xml
                    format: jacoco
                    base-path: fastexcel-reader/src/main/java  # Points to the start of the 'org' package
                    parallel: true

            -   name: code coverage (fastexcel-writer)
                uses: coverallsapp/github-action@v2
                with:
                    file: fastexcel-writer/target/site/jacoco/jacoco.xml
                    format: jacoco
                    base-path: fastexcel-writer/src/main/java  # Points to the start of the 'org' package
                    parallel: true

            -   uses: coverallsapp/github-action@v2
                with:
                    parallel-finished: true
